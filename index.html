<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MN PUFF's Grow Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#08090f; --surface:#0f1120; --card:#161828; --card-hover:#1e2236;
      --border:#252d4a; --border-hi:#3a4570;
      --text:#d4d9f5; --muted:#7a85b8; --faint:#3a4570;
      --gold:#5bc8e8; --gold-hi:#7ee0f8; --gold-dim:#2a6880;
      --green:#5c8050; --green-hi:#78a868;
      --cured-bg:#082c18;   --cured-fg:#a8cc48;
      --growlog-bg:#2c1e06; --growlog-fg:#e0a030;
      --active-bg:#082018;  --active-fg:#38c868;
      --vault-bg:#1a1538;   --vault-fg:#9b78e8;
    }
    html { scroll-behavior: smooth; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:15px; line-height:1.6; min-height:100vh; }

    header { background:linear-gradient(180deg,#08090f00 0%,var(--surface) 100%),linear-gradient(135deg,#08090f 0%,#0f1120 100%); border-bottom:1px solid var(--border); padding:1.4rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .brand { display:flex; flex-direction:column; gap:2px; }
    .brand-name { font-family:'Playfair Display',serif; font-size:1.55rem; color:var(--gold-hi); letter-spacing:.01em; line-height:1.1; }
    .brand-tagline { font-size:.68rem; color:var(--muted); letter-spacing:.18em; text-transform:uppercase; }
    .header-actions { display:flex; gap:.65rem; align-items:center; }

    .btn { padding:.45rem 1rem; border-radius:6px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:.82rem; font-weight:500; transition:all .15s ease; line-height:1.4; }
    .btn-outline { background:transparent; border:1px solid var(--border-hi); color:var(--muted); }
    .btn-outline:hover { border-color:var(--gold-dim); color:var(--gold); }
    .btn-danger { background:#2c1010; border:1px solid #5a2828; color:#d06060; }
    .btn-danger:hover { background:#3c1818; }
    .btn-icon { background:transparent; border:1px solid var(--border); color:var(--faint); border-radius:6px; padding:.4rem .6rem; cursor:pointer; font-size:1rem; line-height:1; transition:all .15s; }
    .btn-icon:hover { border-color:var(--gold-dim); color:var(--gold); }
    .btn-generate { padding:.7rem 1.6rem; background:linear-gradient(135deg,var(--gold-dim),var(--gold)); color:#0c0a07; border:none; border-radius:8px; font-size:.88rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s ease; display:inline-flex; align-items:center; gap:.5rem; }
    .btn-generate:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(91,200,232,.3); }
    .btn-generate:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }

    .filter-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:.6rem 2rem; display:flex; gap:.45rem; align-items:center; overflow-x:auto; }
    .filter-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.12em; color:var(--faint); margin-right:.2rem; white-space:nowrap; flex-shrink:0; }
    .filter-btn { padding:.3rem .85rem; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:.76rem; font-weight:500; font-family:'Inter',sans-serif; transition:all .15s ease; white-space:nowrap; flex-shrink:0; }
    .filter-btn:hover { border-color:var(--border-hi); color:var(--text); }
    .filter-btn.active { background:var(--card); border-color:var(--gold-dim); color:var(--gold); }
    .filter-btn[data-filter="Active"].active    { background:var(--active-bg);  border-color:var(--active-fg);  color:var(--active-fg); }
    .filter-btn[data-filter="Grow Log"].active  { background:var(--growlog-bg); border-color:var(--growlog-fg); color:var(--growlog-fg); }
    .filter-btn[data-filter="Cured"].active     { background:var(--cured-bg);   border-color:var(--cured-fg);   color:var(--cured-fg); }
    .filter-btn[data-filter="Vault"].active     { background:var(--vault-bg);   border-color:var(--vault-fg);   color:var(--vault-fg); }
    .strain-count-badge { margin-left:auto; flex-shrink:0; font-size:.65rem; color:var(--faint); font-family:'JetBrains Mono',monospace; letter-spacing:.04em; }

    main { padding:1.75rem 2rem 3rem; max-width:1400px; margin:0 auto; }
    .strain-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1rem; }

    .strain-card { background:var(--card); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:all .18s ease; display:flex; flex-direction:column; overflow:hidden; }
    .strain-card:hover { background:var(--card-hover); border-color:var(--border-hi); transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,.5); }
    .card-img { width:100%; aspect-ratio:3/4; object-fit:cover; display:none; }
    .card-body { padding:1.2rem 1.1rem; display:flex; flex-direction:column; gap:.55rem; flex:1; }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
    .card-name { font-family:'Playfair Display',serif; font-size:1rem; color:var(--text); line-height:1.3; }
    .card-breeder { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-top:2px; }
    .status-tag { display:inline-flex; align-items:center; padding:.18rem .55rem; border-radius:10px; font-size:.62rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
    .status-tag.Cured    { background:var(--cured-bg);   color:var(--cured-fg); }
    .status-tag.Grow-Log { background:var(--growlog-bg); color:var(--growlog-fg); }
    .status-tag.Active   { background:var(--active-bg);  color:var(--active-fg); }
    .status-tag.Vault    { background:var(--vault-bg);   color:var(--vault-fg); }
    .card-notes { font-size:.74rem; color:var(--muted); font-style:italic; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; border-top:1px solid var(--border); padding-top:.5rem; }
    .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:auto; }
    .card-date { font-size:.65rem; color:var(--faint); font-family:'JetBrains Mono',monospace; }
    .card-researched { font-size:.62rem; color:var(--green-hi); display:flex; align-items:center; gap:3px; letter-spacing:.04em; }

    .modal-hero-img { width:100%; max-height:260px; object-fit:cover; display:none; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(5px); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.hidden { display:none; }
    .modal-box { background:var(--surface); border:1px solid var(--border-hi); border-radius:14px; width:100%; max-width:780px; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 32px 80px rgba(0,0,0,.65); }
    .modal-header { padding:1.4rem 1.6rem 1.1rem; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; gap:.6rem; }
    .modal-header-row { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; }
    .modal-name { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--text); line-height:1.2; }
    .modal-breeder { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:3px; }
    .modal-close { background:transparent; border:none; color:var(--faint); cursor:pointer; font-size:1.2rem; padding:.2rem; line-height:1; flex-shrink:0; transition:color .15s; }
    .modal-close:hover { color:var(--text); }
    .modal-controls { display:flex; align-items:center; gap:.75rem; flex-wrap:wrap; }
    .status-update-group { display:flex; align-items:center; gap:.45rem; }
    select { background:var(--card); color:var(--text); border:1px solid var(--border-hi); border-radius:6px; padding:.3rem .7rem; font-size:.78rem; font-family:'Inter',sans-serif; cursor:pointer; }
    select:focus { outline:1px solid var(--gold-dim); }

    .research-tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; background:var(--surface); padding:0 1rem; scrollbar-width:none; }
    .research-tabs::-webkit-scrollbar { display:none; }
    .tab-btn { padding:.7rem .9rem; font-size:.76rem; font-weight:500; color:var(--muted); cursor:pointer; border:none; background:transparent; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; font-family:'Inter',sans-serif; letter-spacing:.02em; flex-shrink:0; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

    .modal-body { overflow-y:auto; flex:1; min-height:0; }
    .research-panel { padding:1.5rem 1.6rem; display:none; }
    .research-panel.active { display:block; }
    .section-title { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--gold-hi); margin-bottom:.75rem; display:flex; align-items:center; gap:.45rem; }
    .research-text { color:var(--text); line-height:1.8; font-size:.88rem; }
    .research-meta { margin-top:1.2rem; padding-top:.75rem; border-top:1px solid var(--border); font-size:.66rem; color:var(--faint); font-family:'JetBrains Mono',monospace; }
    .research-block { margin-bottom:1.25rem; }
    .research-block:last-child { margin-bottom:0; }
    .research-block-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:.3rem; font-weight:500; }

    .pill-list { display:flex; flex-wrap:wrap; gap:.35rem; }
    .pill { padding:.2rem .6rem; border-radius:10px; font-size:.72rem; font-weight:500; }
    .pill-green { background:var(--active-bg); color:var(--active-fg); }
    .pill-red   { background:#2c1010; color:#d06060; }

    .mood-grid { display:flex; flex-direction:column; gap:.7rem; }
    .mood-row { display:flex; align-items:center; gap:.75rem; }
    .mood-label { font-size:.75rem; color:var(--muted); width:110px; flex-shrink:0; white-space:nowrap; }
    .mood-bar-wrap { flex:1; background:var(--border); border-radius:4px; height:7px; overflow:hidden; }
    .mood-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); transition:width .4s ease; }
    .mood-score { font-size:.72rem; color:var(--faint); width:22px; text-align:right; font-family:'JetBrains Mono',monospace; flex-shrink:0; }

    .generate-panel { padding:3rem 1.6rem; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1.1rem; }
    .generate-glyph { font-size:2.4rem; opacity:.45; }
    .generate-title { font-family:'Playfair Display',serif; font-size:1.15rem; color:var(--muted); }
    .generate-desc { font-size:.82rem; color:var(--faint); max-width:380px; line-height:1.6; }
    .loading-panel { padding:3.5rem 1.6rem; text-align:center; display:flex; flex-direction:column; align-items:center; gap:1.1rem; }
    .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .85s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { color:var(--muted); font-size:.88rem; }
    .loading-sub  { color:var(--faint); font-size:.76rem; }

    .notes-textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.86rem; font-family:'Inter',sans-serif; padding:.75rem .9rem; resize:vertical; min-height:120px; line-height:1.65; }
    .notes-textarea:focus { outline:1px solid var(--gold-dim); border-color:var(--gold-dim); }
    .notes-textarea::placeholder { color:var(--faint); }
    .notes-actions { display:flex; justify-content:flex-end; gap:.5rem; margin-top:.7rem; }

    .settings-modal-box { max-width:460px; }
    .modal-form-body { padding:1.4rem 1.6rem; display:flex; flex-direction:column; gap:1rem; }
    .form-group { display:flex; flex-direction:column; gap:.3rem; }
    .form-label { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.09em; font-weight:500; }
    .form-input { background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.88rem; font-family:'Inter',sans-serif; padding:.55rem .85rem; }
    .form-input:focus { outline:1px solid var(--gold-dim); border-color:var(--gold-dim); }
    .form-input::placeholder { color:var(--faint); }
    .modal-form-footer { padding:.9rem 1.6rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:.6rem; }
    .key-hint { font-size:.74rem; color:var(--faint); line-height:1.5; }

    .empty-state { grid-column:1/-1; text-align:center; padding:4rem 2rem; }
    .empty-glyph { font-size:2.2rem; opacity:.35; margin-bottom:.75rem; }
    .empty-text  { font-size:.85rem; color:var(--faint); }
    footer { border-top:1px solid var(--border); padding:1.4rem 2rem; text-align:center; margin-top:1rem; }
    .footer-text { font-size:.68rem; color:var(--faint); letter-spacing:.08em; text-transform:uppercase; }
    .sep { display:inline-block; margin:0 .45rem; opacity:.4; }
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--card-hover); border:1px solid var(--border-hi); color:var(--text); padding:.65rem 1.1rem; border-radius:8px; font-size:.82rem; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,.4); transition:opacity .3s ease; }
    .toast.hidden { opacity:0; pointer-events:none; }

    @media (max-width:640px) {
      header { padding:1rem; } .brand-name { font-size:1.25rem; }
      main { padding:1rem 1rem 2.5rem; } .filter-bar { padding:.6rem 1rem; }
      .strain-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.75rem; }
      .modal-box { max-height:95vh; } .modal-name { font-size:1.25rem; }
      .mood-label { width:90px; font-size:.68rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-name">MN PUFF's Grow Log</div>
    <div class="brand-tagline">Pigtail Gardens &middot; Track &middot; Harvest</div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="key-indicator" onclick="openSettings()" title="API Key Settings">&#9881;</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all"      onclick="setFilter('all',this)">All</button>
  <button class="filter-btn"        data-filter="Active"   onclick="setFilter('Active',this)">Active</button>
  <button class="filter-btn"        data-filter="Grow Log" onclick="setFilter('Grow Log',this)">Grow Log</button>
  <button class="filter-btn"        data-filter="Cured"    onclick="setFilter('Cured',this)">Cured</button>
  <button class="filter-btn"        data-filter="Vault"    onclick="setFilter('Vault',this)">Vault</button>
  <span class="strain-count-badge" id="strain-count"></span>
</div>

<main>
  <div class="strain-grid" id="strain-grid">
    <div class="empty-state"><div class="empty-glyph">&#127807;</div><div class="empty-text">Loading&hellip;</div></div>
  </div>
</main>

<!-- Detail modal -->
<div class="modal-overlay hidden" id="detail-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-row">
        <div><div class="modal-name" id="modal-name"></div><div class="modal-breeder" id="modal-breeder"></div></div>
        <button class="modal-close" onclick="closeDetailModal()">&#x2715;</button>
      </div>
      <div class="modal-controls">
        <span id="modal-status-tag" class="status-tag"></span>
        <div class="status-update-group">
          <select id="modal-status-select">
            <option value="Active">Active</option>
            <option value="Grow Log">Grow Log</option>
            <option value="Cured">Cured</option>
            <option value="Vault">Vault</option>
          </select>
          <button class="btn btn-outline" onclick="updateStatus()">Update</button>
        </div>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
    <img id="modal-strain-img" class="modal-hero-img" alt="">
    <div class="research-tabs hidden" id="research-tabs">
      <button class="tab-btn active" data-tab="genetics" onclick="switchTab('genetics',this)">&#x1F9EC; Genetics</button>
      <button class="tab-btn" data-tab="terpenes"        onclick="switchTab('terpenes',this)">&#x1F33F; Terpenes</button>
      <button class="tab-btn" data-tab="effects"         onclick="switchTab('effects',this)">&#x2728; Effects</button>
      <button class="tab-btn" data-tab="moods"           onclick="switchTab('moods',this)">&#x1F4CA; Moods</button>
      <button class="tab-btn" data-tab="grow"            onclick="switchTab('grow',this)">&#x1FAB4; Grow Notes</button>
      <button class="tab-btn" data-tab="rosin"           onclick="switchTab('rosin',this)">&#x1F36F; Rosin</button>
      <button class="tab-btn" data-tab="notes"           onclick="switchTab('notes',this)">&#x1F4DD; My Notes</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal-box settings-modal-box">
    <div class="modal-header">
      <div class="modal-header-row">
        <div class="modal-name" style="font-size:1.3rem">&#9881; API Key</div>
        <button class="modal-close" onclick="closeSettings()">&#x2715;</button>
      </div>
    </div>
    <div class="modal-form-body">
      <div class="form-group">
        <label class="form-label">Anthropic API Key</label>
        <input class="form-input" type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
        <div class="key-hint" style="margin-top:.4rem">Stored in your browser only &mdash; never committed to the repo. Get yours at console.anthropic.com.</div>
      </div>
    </div>
    <div class="modal-form-footer">
      <button class="btn btn-danger" onclick="clearApiKey()">Clear</button>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-outline" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-outline" onclick="saveApiKey()" style="border-color:var(--gold-dim);color:var(--gold)">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<footer>
  <div class="footer-text">
    MN PUFF's Grow Log <span class="sep">&middot;</span> Pigtail Gardens <span class="sep">&middot;</span> Personal Use Only - NFS <span class="sep">&middot;</span> Research powered by Claude AI
  </div>
</footer>

<script>
'use strict';

const LS_STRAINS  = 'bgl_strains';
const LS_RESEARCH = 'bgl_research';
const LS_APIKEY   = 'bgl_apikey';

const DEFAULT_STRAINS = [

  { id:'nana-glue',             name:'Nana Glue',              breeder:'Square One Genetics',                 status:'Vault', notes:'Gorilla Glue #4 x Banana Butter Cups.', added:'2026-05-31' },
  { id:'cream-smoothie',        name:'Cream Smoothie',         breeder:'Fiya Farmer',                         status:'Vault', notes:'Gelonade x C.R.E.A.M. Verified cut from Pig Tail Gardens.', added:'2026-05-31' },
  { id:'grease-monkey',         name:'Grease Monkey',          breeder:'Symbiotic Genetics',                  status:'Vault', notes:'Cookies & Cream x Gorilla Glue #4.', added:'2026-05-31' },
  { id:'blue-nerdz',            name:'Blue Nerdz',             breeder:'Sherb Money / Runtz Crew',            status:'Vault', notes:'Verified cut from Pig Tail Gardens.', added:'2026-05-31' },
  { id:'jet-fuel-og',           name:'Jet Fuel OG',            breeder:'303 Seeds',                           status:'Vault', notes:'Aspen OG x High Country Diesel.', added:'2026-05-31' },
  { id:'blue-dream',            name:'Blue Dream',             breeder:'Heirloom (Santa Cruz)',               status:'Vault', notes:'Blueberry x Haze. Heirloom Santa Cruz cut from Pig Tail Gardens.', added:'2026-05-31' },
  { id:'pre-98-bubba-kush',     name:'Pre 98 Bubba Kush',      breeder:'Heirloom (pre-1998 phenotype)',       status:'Vault', notes:'Classic SoCal indica heirloom. Hash plant structure.', added:'2026-05-31' },
  { id:'skywalker-og',          name:'Skywalker OG',           breeder:'Heirloom (Hollywood cut)',            status:'Vault', notes:'Emerald Triangle x Nevill\'s Hindu Kush. Verified cut from Pig Tail Gardens.', added:'2026-05-31' },
  { id:'kush-mintz',            name:'Kush Mintz',             breeder:'Seed Junky Genetics (Rabid Hippie cut)', status:'Vault', notes:'Bubba Kush x Animal Mints. Verified cut from Pig Tail Gardens.', added:'2026-05-31' },
];

const MOODS = [
  { key:'wind_down',     label:'Wind Down'     },
  { key:'anxiety_relief',label:'Anxiety Relief'},
  { key:'lift_up',       label:'Lift Up'       },
  { key:'get_creative',  label:'Get Creative'  },
  { key:'get_social',    label:'Get Social'    },
  { key:'pain_body',     label:'Pain & Body'   },
  { key:'just_happy',    label:'Just Happy'    },
  { key:'aphrodisiac',   label:'Aphrodisiac'   },
];

let allStrains    = [];
let researchCache = {};
let currentFilter = 'all';
let currentId     = null;

function loadStrains()  { try { return JSON.parse(localStorage.getItem(LS_STRAINS))  || null; } catch { return null; } }
function saveStrains()  { localStorage.setItem(LS_STRAINS,  JSON.stringify(allStrains)); }
function loadResearch() { try { return JSON.parse(localStorage.getItem(LS_RESEARCH)) || {}; }  catch { return {}; } }
function saveResearch() { localStorage.setItem(LS_RESEARCH, JSON.stringify(researchCache)); }
function getApiKey()    { return localStorage.getItem(LS_APIKEY) || ''; }

const DEFAULT_RESEARCH = {}; // Research loaded from data/research_cache.json

async function init() {
  // 1. Try Python API (local dev with FastAPI)
  try {
    const resp = await fetch('/api/strains');
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    allStrains = data.strains || [];
    researchCache = {};
  } catch {
    // 2. Try static JSON files (GitHub Pages or any web server)
    try {
      const [sRes, rRes] = await Promise.all([
        fetch('./data/strains.json'),
        fetch('./data/research_cache.json')
      ]);
      if (!sRes.ok) throw new Error();
      allStrains = (await sRes.json()).strains || [];
      researchCache = rRes.ok ? await rRes.json() : loadResearch();
    } catch {
      // 3. Last resort: localStorage or minimal hardcoded defaults
      const saved = loadStrains();
      allStrains = saved || JSON.parse(JSON.stringify(DEFAULT_STRAINS));
      if (!saved) saveStrains();
      researchCache = loadResearch();
    }
  }
  updateKeyIndicator();
  renderGrid();
}

function loadStrainImg(el, id) {
  el.style.display = 'none';
  el.onload  = () => { el.style.display = 'block'; };
  el.onerror = () => {
    if (!el.dataset.triedPng) {
      el.dataset.triedPng = '1';
      el.src = `images/strains/${id}.png?v=3`;
    } else {
      el.style.display = 'none';
    }
  };
  el.src = `images/strains/${id}.jpg?v=3`;
}

function renderGrid() {
  const grid = document.getElementById('strain-grid');
  const ce   = document.getElementById('strain-count');
  const strains = currentFilter === 'all' ? allStrains : allStrains.filter(s => s.status === currentFilter);
  ce.textContent = `${strains.length} strain${strains.length !== 1 ? 's' : ''}`;
  if (!strains.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-glyph">&#127807;</div><div class="empty-text">No ${currentFilter !== 'all' ? currentFilter + ' ' : ''}strains yet.</div></div>`;
    return;
  }
  grid.innerHTML = strains.map(s => {
    const sc  = s.status.replace(' ', '-');
    const res = researchCache[s.id];
    const topMood = res?.mood_ratings ? getTopMood(res.mood_ratings) : null;
    return `<div class="strain-card" onclick="openDetail('${s.id}')">
      <img class="card-img" data-id="${s.id}" alt="${esc(s.name)}">
      <div class="card-body">
        <div class="card-top">
          <div><div class="card-name">${esc(s.name)}</div><div class="card-breeder">${esc(s.breeder)}</div></div>
          <span class="status-tag ${sc}">${esc(s.status)}</span>
        </div>
        ${s.notes ? `<div class="card-notes">${esc(s.notes)}</div>` : ''}
        <div class="card-footer">
          <span class="card-date">${s.added}</span>
          ${topMood ? `<span class="card-researched">&#x2726; ${esc(topMood)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.card-img[data-id]').forEach(img => loadStrainImg(img, img.dataset.id));
}

function getTopMood(ratings) {
  const top = Object.entries(ratings).sort((a,b) => b[1]-a[1])[0];
  if (!top) return null;
  const mood = MOODS.find(m => m.key === top[0]);
  return mood ? mood.label : null;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

async function openDetail(id) {
  currentId = id;
  const strain = allStrains.find(s => s.id === id);
  if (!strain) return;
  document.getElementById('modal-name').textContent    = strain.name;
  document.getElementById('modal-breeder').textContent = strain.breeder;
  const tag = document.getElementById('modal-status-tag');
  tag.textContent = strain.status;
  tag.className   = `status-tag ${strain.status.replace(' ', '-')}`;
  document.getElementById('modal-status-select').value = strain.status;
  const heroImg = document.getElementById('modal-strain-img');
  heroImg.alt = strain.name;
  delete heroImg.dataset.triedPng;
  loadStrainImg(heroImg, id);
  showOverlay('detail-modal');
  // If research already loaded (from static files or previous fetch), use it immediately
  if (researchCache[id]) { renderResearch(researchCache[id], strain); return; }
  // Try Python API (local dev mode)
  try {
    const resp = await fetch(`/api/research/${id}`);
    if (resp.ok) {
      const data = await resp.json();
      if (data && Object.keys(data).length > 0) {
        researchCache[id] = data;
        renderResearch(data, strain);
        return;
      }
    }
  } catch {}
  showGeneratePanel(strain);
}

function closeDetailModal() {
  hideOverlay('detail-modal');
  document.getElementById('research-tabs').classList.add('hidden');
  const heroImg = document.getElementById('modal-strain-img');
  heroImg.style.display = 'none';
  heroImg.src = '';
  currentId = null;
}

function setModalBody(html) {
  document.getElementById('research-tabs').classList.add('hidden');
  document.getElementById('modal-body').innerHTML = html;
}

function showGeneratePanel(strain) {
  setModalBody(`
    <div class="generate-panel">
      <div class="generate-glyph">&#x1F52C;</div>
      <div class="generate-title">No research yet</div>
      <div class="generate-desc">Generate a full profile for <strong style="color:var(--text)">${esc(strain.name)}</strong> &mdash; genetics, terpenes, effects, mood ratings, grow notes, and rosin extraction.</div>
      <button class="btn-generate" onclick="generateResearch()">&#x2726;&nbsp;Generate Research</button>
    </div>
    <div style="padding:0 1.6rem 1.5rem;border-top:1px solid var(--border);padding-top:1.25rem">
      <div class="form-group" style="gap:.45rem">
        <label class="form-label">My Notes</label>
        <textarea class="notes-textarea" id="notes-standalone" placeholder="Personal notes, grow observations&hellip;">${esc(strain.notes || '')}</textarea>
        <div class="notes-actions"><button class="btn btn-outline" onclick="saveNotes()">Save Notes</button></div>
      </div>
    </div>`);
}

function renderResearch(r, strain) {
  const tabs    = document.getElementById('research-tabs');
  const body    = document.getElementById('modal-body');
  const genDate = r.generated_at ? new Date(r.generated_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '';

  // Support both old field names (lineage, aroma, misc) and new ones (genetics_lineage, flavor_aroma)
  const lineage  = r.genetics_lineage || r.lineage      || '';
  const aroma    = r.flavor_aroma     || r.aroma        || '';
  const misc     = r.misc             || '';
  const terps    = r.terpene_profile  || '';
  const effects  = r.effects          || '';
  const grow     = r.grow_notes       || '';
  const rosin    = r.rosin_extraction || '';

  const mr       = r.mood_ratings || {};
  const hasMoods = Object.keys(mr).length > 0;
  const moodBars = MOODS.map(m => {
    const score = mr[m.key] || 0;
    return `<div class="mood-row">
      <span class="mood-label">${esc(m.label)}</span>
      <div class="mood-bar-wrap"><div class="mood-bar-fill" style="width:${(score/10)*100}%"></div></div>
      <span class="mood-score">${score}</span>
    </div>`;
  }).join('');

  const therapeuticPills = (r.therapeutic || '').split(',').map(t => t.trim()).filter(Boolean)
    .map(t => `<span class="pill pill-green">${esc(t)}</span>`).join('');
  const negativePills = (r.negative || '').split(',').map(t => t.trim()).filter(Boolean)
    .map(t => `<span class="pill pill-red">${esc(t)}</span>`).join('');

  body.innerHTML = `
    <div class="research-panel active" id="panel-genetics">
      <div class="research-block"><div class="section-title">&#x1F9EC;&nbsp;Genetics &amp; Lineage</div><div class="research-text">${esc(lineage || '—')}</div></div>
      ${misc ? `<div class="research-block" style="margin-top:1.1rem"><div class="research-block-label">Breeder Notes</div><div class="research-text">${esc(misc)}</div></div>` : ''}
      ${genDate ? `<div class="research-meta" style="margin-top:1rem">Generated ${genDate} &middot; Claude AI</div>` : ''}
    </div>
    <div class="research-panel" id="panel-terpenes">
      <div class="research-block"><div class="section-title">&#x1F33F;&nbsp;Terpene Profile</div><div class="research-text">${esc(terps || '—')}</div></div>
      ${aroma ? `<div class="research-block" style="margin-top:1.1rem"><div class="research-block-label">Flavor &amp; Aroma</div><div class="research-text">${esc(aroma)}</div></div>` : ''}
    </div>
    <div class="research-panel" id="panel-effects">
      <div class="research-block"><div class="section-title">&#x2728;&nbsp;Effects</div><div class="research-text" style="margin-bottom:.9rem">${esc(effects || '—')}</div></div>
      ${therapeuticPills ? `<div class="research-block"><div class="research-block-label">Therapeutic</div><div class="pill-list">${therapeuticPills}</div></div>` : ''}
      ${negativePills ? `<div class="research-block" style="margin-top:.85rem"><div class="research-block-label">Side Effects &amp; Cautions</div><div class="pill-list">${negativePills}</div></div>` : ''}
    </div>
    ${hasMoods ? `<div class="research-panel" id="panel-moods">
      <div class="section-title">&#x1F4CA;&nbsp;Mood Ratings</div>
      <div class="mood-grid">${moodBars}</div>
    </div>` : '<div class="research-panel" id="panel-moods"></div>'}
    <div class="research-panel" id="panel-grow"><div class="section-title">&#x1FAB4;&nbsp;Grow Notes</div><div class="research-text">${esc(grow || '—')}</div></div>
    <div class="research-panel" id="panel-rosin"><div class="section-title">&#x1F36F;&nbsp;Rosin &amp; Extraction</div><div class="research-text">${esc(rosin || '—')}</div></div>
    <div class="research-panel" id="panel-notes">
      <div class="section-title">&#x1F4DD;&nbsp;My Notes</div>
      <textarea class="notes-textarea" id="notes-main" placeholder="Personal grow notes, observations&hellip;">${esc(strain.notes || '')}</textarea>
      <div class="notes-actions"><button class="btn btn-outline" onclick="saveNotes()">Save Notes</button></div>
    </div>`;

  tabs.classList.remove('hidden');
  tabs.querySelectorAll('.tab-btn').forEach(t => { t.classList.remove('active'); t.style.display = ''; });
  const moodsTab = tabs.querySelector('[data-tab="moods"]');
  if (moodsTab) moodsTab.style.display = hasMoods ? '' : 'none';
  tabs.querySelector('[data-tab="genetics"]').classList.add('active');
}

function switchTab(tabId, btn) {
  document.querySelectorAll('.research-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById(`panel-${tabId}`);
  if (panel) panel.classList.add('active');
  btn.classList.add('active');
}

async function generateResearch() {
  if (!currentId) return;
  const strain = allStrains.find(s => s.id === currentId);
  setModalBody(`<div class="loading-panel"><div class="spinner"></div>
    <div class="loading-text">Claude is researching ${esc(strain?.name || 'this strain')}&hellip;</div>
    <div class="loading-sub">Genetics &middot; Terpenes &middot; Grow &middot; Rosin</div></div>`);

  // Try server API first (no key needed)
  try {
    const resp = await fetch(`/api/research/${currentId}`, { method: 'POST' });
    if (resp.ok) {
      const result = await resp.json();
      if (result && Object.keys(result).length > 0) {
        researchCache[currentId] = result;
        saveResearch();
        renderResearch(result, strain);
        renderGrid();
        toast('Research generated &#x2726;');
        return;
      }
    }
  } catch {}

  // Fall back to direct Anthropic API
  const apiKey = getApiKey();
  if (!apiKey) { toast('Add your Anthropic API key first &#9881;'); openSettings(); return; }
  const prompt = `You are a cannabis genetics expert and master craft cultivator specializing in solventless extraction. Generate a detailed research profile for "${strain.name}" by ${strain.breeder}. Many strains in this collection were sourced from Pig Tail Gardens (pigtailgardens.com), a small-batch breeder and cultivator in Hollywood, CA.

Return ONLY valid JSON:
{
  "genetics_lineage": "Full genetic lineage, breeder background, PTG provenance if applicable. 3-4 sentences.",
  "terpene_profile": "Dominant and secondary terpenes, aromas, synergistic interactions, expression in rosin. 3-4 sentences.",
  "effects": "Onset, intensity, cerebral vs body, duration, mood profile, best use cases. 3-4 sentences.",
  "flavor_aroma": "Detailed flavor notes inhale/exhale, aroma at grow stages and after cure. 3-4 sentences.",
  "grow_notes": "Structure, stretch, flowering time, training, VPD/temp/humidity, harvest indicators. 3-4 sentences.",
  "rosin_extraction": "IWHE yield %, wash water temps, press temps in F, final product description. 3-4 sentences."
}
Output only JSON.`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true', 'content-type':'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2048, messages:[{ role:'user', content:prompt }] }),
    });
    if (!resp.ok) { const err = await resp.json().catch(()=>({})); throw new Error(err.error?.message || `HTTP ${resp.status}`); }
    const data = await resp.json();
    let content = data.content[0].text.trim();
    if (content.startsWith('```')) { const lines = content.split('\n'); content = lines.slice(1,-1).join('\n').trim(); }
    const result = JSON.parse(content);
    result.generated_at = new Date().toISOString();
    researchCache[currentId] = result;
    saveResearch();
    renderResearch(result, strain);
    renderGrid();
    toast('Research generated &#x2726;');
  } catch (e) {
    setModalBody(`<div class="generate-panel"><div class="generate-glyph">&#9888;</div><div class="generate-title">Research failed</div><div class="generate-desc">${esc(e.message)}</div><button class="btn-generate" onclick="generateResearch()">Try Again</button></div>`);
  }
}

function updateStatus() {
  if (!currentId) return;
  const newStatus = document.getElementById('modal-status-select').value;
  const idx = allStrains.findIndex(s => s.id === currentId);
  if (idx === -1) return;
  allStrains[idx].status = newStatus;
  saveStrains();
  const tag = document.getElementById('modal-status-tag');
  tag.textContent = newStatus;
  tag.className   = `status-tag ${newStatus.replace(' ', '-')}`;
  renderGrid();
  toast('Status updated');
}

function saveNotes() {
  if (!currentId) return;
  const el = document.getElementById('notes-main') || document.getElementById('notes-standalone');
  if (!el) return;
  const idx = allStrains.findIndex(s => s.id === currentId);
  if (idx === -1) return;
  allStrains[idx].notes = el.value;
  saveStrains();
  renderGrid();
  toast('Notes saved');
}

function confirmDelete() {
  if (!currentId) return;
  const strain = allStrains.find(s => s.id === currentId);
  if (!confirm(`Delete "${strain?.name}"? This cannot be undone.`)) return;
  allStrains = allStrains.filter(s => s.id !== currentId);
  delete researchCache[currentId];
  saveStrains();
  saveResearch();
  closeDetailModal();
  renderGrid();
  toast('Strain removed');
}

function openSettings()  { document.getElementById('api-key-input').value = getApiKey(); showOverlay('settings-modal'); }
function closeSettings() { hideOverlay('settings-modal'); }

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key) localStorage.setItem(LS_APIKEY, key); else localStorage.removeItem(LS_APIKEY);
  updateKeyIndicator();
  toast(key ? 'API key saved' : 'API key cleared');
  closeSettings();
}

function clearApiKey() {
  localStorage.removeItem(LS_APIKEY);
  document.getElementById('api-key-input').value = '';
  updateKeyIndicator();
  toast('API key cleared');
  closeSettings();
}

function updateKeyIndicator() {
  const btn = document.getElementById('key-indicator');
  const set = !!getApiKey();
  btn.style.color       = set ? 'var(--green-hi)' : 'var(--faint)';
  btn.style.borderColor = set ? 'var(--green)'    : 'var(--border)';
  btn.title = set ? 'API key set' : 'API key not set — click to add';
}

function showOverlay(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function hideOverlay(id) {
  document.getElementById(id).classList.add('hidden');
  const anyOpen = ['detail-modal','settings-modal'].some(mid => !document.getElementById(mid).classList.contains('hidden'));
  if (!anyOpen) document.body.style.overflow = '';
}

document.getElementById('detail-modal').addEventListener('click',  e => { if (e.target===e.currentTarget) closeDetailModal(); });
document.getElementById('settings-modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeSettings(); });
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!document.getElementById('detail-modal').classList.contains('hidden'))  closeDetailModal();
  else if (!document.getElementById('settings-modal').classList.contains('hidden')) closeSettings();
});

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 2800);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
